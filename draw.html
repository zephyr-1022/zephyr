<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谁是赌狗</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,"Microsoft YaHei",sans-serif;
}
body{
    background:#121212;
    color:#fff;
    padding:20px;
    min-height:100vh;
    text-align:center;
}
.title{
    font-size:26px;
    color:#a855f7;
    margin:30px 0 10px;
}
.sub{
    color:#aaa;
    margin-bottom:30px;
}
.card-box{
    max-width:280px;
    height:360px;
    margin:0 auto;
    background:#1a1a1a;
    border:2px solid #333;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:15px;
    padding:20px;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}
/* 抽卡闪光特效 */
.card-box::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(168,85,247,0.2),transparent);
    transition:0.6s;
}
.card-box.active::before{
    left:100%;
}
.card-box.active{
    border-color:#a855f7;
    box-shadow:0 0 30px rgba(168,85,247,0.5);
    animation: shake 0.5s ease;
}
/* 卡片翻转动画 */
@keyframes flipIn {
    0%{transform:rotateY(90deg); opacity:0;}
    100%{transform:rotateY(0); opacity:1;}
}
@keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
}
.card-img{
    width:200px;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    animation: flipIn 0.6s ease forwards;
}
.card-name{
    font-size:16px;
    font-weight:bold;
    color:#fff;
    animation: fadeIn 0.8s ease forwards;
}
.card-rarity{
    padding:4px 10px;
    background:#a855f7;
    color:#fff;
    border-radius:99px;
    font-size:12px;
    animation: fadeIn 0.8s ease forwards;
}
@keyframes fadeIn {
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
.btn{
    margin-top:30px;
    padding:16px 40px;
    background:linear-gradient(90deg,#a855f7,#7c3aed);
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(168,85,247,0.3);
}
.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(168,85,247,0.5);
}
.btn:active{
    transform:scale(0.95);
}
.tip{
    margin-top:15px;
    color:#888;
    font-size:14px;
}
.back{
    position:absolute;
    top:20px;
    left:20px;
    color:#a855f7;
    text-decoration:none;
    font-size:16px;
}
</style>
</head>

<body>
<a href=" " class="back">← 返回主页</a >
<h1 class="title">赌狗模拟器</h1>
<p class="sub">开赌！</p >

<div class="card-box" id="cardBox">
    <span id="emptyText">点击下方开始抽卡</span>
    <img class="card-img" id="cardImg" style="display:none;">
    <div class="card-rarity" id="rarity" style="display:none;">SSR 稀有</div>
    <div class="card-name" id="cardName" style="display:none;">李梓豪</div>
</div>

<button class="btn" onclick="draw()">✨ 立即开赌</button>
<p class="tip">祝你一发入魂 💜</p >

<script>
// 本地图片版 —— 图片和draw.html放在同一文件夹
const cards = [
    { name: "舞台限定",  url: "1.jpg",  rarity: "SSR", color: "#a855f7" },
    { name: "日常可爱",  url: "2.jpg",  rarity: "SR",  color: "#7c3aed" },
    { name: "练习室抓拍",url: "3.jpg",  rarity: "R",   color: "#6366f1" },
    { name: "生日特别卡",url: "4.jpg",  rarity: "SSR", color: "#a855f7" }
];

function draw() {
    const box = document.getElementById("cardBox");
    const img = document.getElementById("cardImg");
    const name = document.getElementById("cardName");
    const rarity = document.getElementById("rarity");
    const emptyText = document.getElementById("emptyText");

    // 先隐藏旧卡片，重置状态
    img.style.display = "none";
    name.style.display = "none";
    rarity.style.display = "none";
    emptyText.style.display = "block";
    box.classList.remove("active");

    // 触发震动+闪光动画
    setTimeout(() => {
        box.classList.add("active");
    }, 100);

    // 600ms后显示新卡片
    setTimeout(() => {
        let card = cards[Math.floor(Math.random() * cards.length)];

        img.src = card.url;
        rarity.innerText = card.rarity + " 稀有";
        rarity.style.background = card.color;
        name.innerText = card.name;

        img.style.display = "block";
        name.style.display = "block";
        rarity.style.display = "block";
        emptyText.style.display = "none";
    }, 600);
}
</script>
</body>
</html>
